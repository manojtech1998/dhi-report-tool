<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHI Report Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

html,body{
  height:100%;
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
  background:#f4f7fa;
}

/* HEADER */
header{
  height:60px;
  background:#004D55;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

/* LAYOUT */
.app{
  display:flex;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#1A2A3A;
  color:#fff;
  padding:10px;
  overflow-y:auto;
}

.sidebar button{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#00B4D8;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.day{
  padding:8px;
  margin:5px 0;
  background:#243447;
  cursor:pointer;
  border-radius:6px;
}

/* CONTENT */
.content{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

/* PREVIEW */
.slide{
  min-height:100vh;
  padding:20px;
  border-bottom:1px solid #ddd;
}
</style>
</head>

<body>

<header>
  <h2>DHI Report Builder</h2>
  <button onclick="preview()">Preview</button>
</header>

<div class="app">

  <div class="sidebar">
    <button onclick="addDay()">+ Add Day</button>
    <div id="dayList"></div>
  </div>

  <div class="content" id="content"></div>

</div>

<script>

let days = JSON.parse(localStorage.getItem("data")) || [
  {patientName:"", grafts:"", notes:""}
];

let current = 0;

/* RENDER SIDEBAR */
function renderSidebar(){
  document.getElementById("dayList").innerHTML =
    days.map((d,i)=>`
      <div class="day" onclick="openDay(${i})">
        Day ${i+1}
      </div>
    `).join("");
}

/* OPEN DAY */
function openDay(i){
  current = i;
  let d = days[i];

  document.getElementById("content").innerHTML = `
    <div class="card">
      <h3>Day ${i+1}</h3>

      <label>Patient Name</label>
      <input value="${d.patientName}" 
        oninput="update('patientName',this.value)">

      <label>Grafts</label>
      <input value="${d.grafts}" 
        oninput="update('grafts',this.value)">

      <label>Notes</label>
      <textarea oninput="update('notes',this.value)">
${d.notes}</textarea>

    </div>
  `;
}

/* UPDATE */
function update(key,val){
  days[current][key] = val;
  localStorage.setItem("data", JSON.stringify(days));
}

/* ADD DAY */
function addDay(){
  days.push({patientName:"",grafts:"",notes:""});
  renderSidebar();
  openDay(days.length-1);
}

/* PREVIEW FIXED */
function preview(){

  let html = `
  <html>
  <head>
    <title>Preview</title>
    <style>
      body{margin:0;font-family:sans-serif}
      .slide{
        min-height:100vh;
        padding:20px;
        border-bottom:1px solid #ccc;
      }
    </style>
  </head>
  <body>
  `;

  html += days.map(d=>`
    <div class="slide">
      <h2>${d.patientName}</h2>
      <p><b>Grafts:</b> ${d.grafts}</p>
      <p>${d.notes}</p>
    </div>
  `).join("");

  html += "</body></html>";

  let w = window.open();
  w.document.write(html);
}

/* INIT */
renderSidebar();
openDay(0);

</script>

</body>
</html>
