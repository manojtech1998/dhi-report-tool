<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHI Clinical Report Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root{
  --pri:#006D77;
  --bg:#F0F4F8;
  --txt:#1C2B3A;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* FIXED BODY */
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--txt);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
  overflow-y:auto;
}

/* HEADER */
header{
  background:#004D55;
  color:#fff;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
}

/* LAYOUT */
.app{
  display:flex;
  flex:1;
  min-height:0;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#1A2A3A;
  color:#fff;
  overflow-y:auto;
}

/* CONTENT SCROLL FIX */
.content{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

/* INPUT */
input,textarea,select{
  width:100%;
  padding:8px;
  margin-top:5px;
  border:1px solid #ccc;
  border-radius:6px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* PREVIEW FIX */
.pv-slide{
  width:100%;
  background:#fff;
  display:flex;
  overflow:auto;
}

.pv-panel{
  overflow:auto;
}

.pv-rows{
  overflow:auto;
}

</style>
</head>

<body>

<header>
  <h2>DHI Report Builder</h2>
  <button onclick="preview()">Preview</button>
</header>

<div class="app">
  <div class="sidebar">
    <button onclick="addDay()">+ Add Day</button>
    <div id="days"></div>
  </div>

  <div class="content" id="content"></div>
</div>

<script>

/* DATA */
let days = [
  {
    patientName:"",
    grafts:"",
    notes:""
  }
];

/* RENDER */
function render(){
  document.getElementById("days").innerHTML = days.map((d,i)=>`
    <div onclick="openDay(${i})">Day ${i+1}</div>
  `).join("");

  openDay(0);
}

/* OPEN DAY */
function openDay(i){
  let d = days[i];

  document.getElementById("content").innerHTML = `
    <div class="card">
      <label>Patient Name</label>
      <input value="${d.patientName}" oninput="update(${i},'patientName',this.value)">

      <label>Grafts</label>
      <input value="${d.grafts}" oninput="update(${i},'grafts',this.value)">

      <label>Notes</label>
      <textarea oninput="update(${i},'notes',this.value)">${d.notes}</textarea>
    </div>
  `;
}

/* UPDATE */
function update(i,key,val){
  days[i][key]=val;
  localStorage.setItem("data",JSON.stringify(days));
}

/* ADD DAY */
function addDay(){
  days.push({patientName:"",grafts:"",notes:""});
  render();
}

/* PREVIEW */
function preview(){
  let html = days.map(d=>`
    <div class="pv-slide">
      <div style="padding:20px">
        <h3>${d.patientName}</h3>
        <p>Grafts: ${d.grafts}</p>
        <p>${d.notes}</p>
      </div>
    </div>
  `).join("");

  let w = window.open();
  w.document.write(html);
}

/* LOAD */
let saved = localStorage.getItem("data");
if(saved){
  days = JSON.parse(saved);
}

render();

</script>

</body>
</html>
